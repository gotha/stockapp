services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stockbot
      POSTGRES_PASSWORD: stockbot
      POSTGRES_DB: stockbot
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://stockbot:stockbot@db:5432/stockbot
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api

  collector:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: collector
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://stockbot:stockbot@db:5432/stockbot
      - LOG_LEVEL=info
      - COLLECTION_INTERVAL_MS=5000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

